services:
  api:
    build: .
    image: phansora-api
    env_file: .env
    ports:
      - "${PORT:-8000}:8000"
    # Connects to the ONE shared Phansora Postgres (owned by the phansora
    # frontend stack — container `phansora_postgres`), never a DB of its own.
    # When running via this compose, set DB_HOST=host.docker.internal in .env so
    # the container reaches the host-published port (5433 dev / 5432 prod).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - media:/app/book_alchemy
    restart: unless-stopped

  worker:
    image: phansora-api
    build: .
    command: ["python", "-m", "phansora.products.spokenverse.worker"]
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - media:/app/book_alchemy
    restart: unless-stopped

volumes:
  media:
