services:
  api:
    build: .
    image: phansora-api
    env_file: .env
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - media:/app/book_alchemy
    depends_on:
      - db
    restart: unless-stopped

  worker:
    image: phansora-api
    build: .
    command: ["python", "-m", "phansora.products.spokenverse.worker"]
    env_file: .env
    volumes:
      - ./data:/app/data
      - media:/app/book_alchemy
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    # Credentials come from .env (via Compose variable interpolation). No inline
    # fallbacks — a literal here trips secret scanners (GitGuardian) and risks a
    # weak default reaching production.
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
  media:
